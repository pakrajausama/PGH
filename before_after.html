<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Before & After Image Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .upload-box {
      margin-bottom: 20px;
    }

    .upload-box input {
      margin: 10px;
    }

    .image-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
    }

    .image-box {
      width: 45%;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .image-box h2 {
      margin: 5px 0 10px 0;
    }

    .image-box img {
      max-width: 100%;
      max-height: 400px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      font-size: 16px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<h1>Before & After Image Viewer</h1>

<div class="upload-box">
  <input type="file" id="beforeInput" accept="image/*">
  <input type="file" id="afterInput" accept="image/*">
</div>

<div class="image-container">
  <div class="image-box">
    <h2>Before</h2>
    <img id="beforeImage" src="">
  </div>

  <div class="image-box">
    <h2>After</h2>
    <img id="afterImage" src="">
  </div>
</div>

<button onclick="downloadCombinedImage()">Download Combined Image</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>
  const beforeInput = document.getElementById("beforeInput");
  const afterInput = document.getElementById("afterInput");

  const beforeImage = document.getElementById("beforeImage");
  const afterImage = document.getElementById("afterImage");

  beforeInput.addEventListener("change", function () {
    const file = this.files[0];
    if (file) beforeImage.src = URL.createObjectURL(file);
  });

  afterInput.addEventListener("change", function () {
    const file = this.files[0];
    if (file) afterImage.src = URL.createObjectURL(file);
  });

  function downloadCombinedImage() {
    if (!beforeImage.src || !afterImage.src) {
      alert("Please select both images first.");
      return;
    }

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const img1 = new Image();
    const img2 = new Image();

    img1.src = beforeImage.src;
    img2.src = afterImage.src;

    Promise.all([
      new Promise(res => img1.onload = res),
      new Promise(res => img2.onload = res)
    ]).then(() => {
      const headingHeight = 50;
      const width = img1.width + img2.width;
      const height = Math.max(img1.height, img2.height) + headingHeight;

      canvas.width = width;
      canvas.height = height;

      // background
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, width, height);

      // headings
      ctx.fillStyle = "black";
      ctx.font = "bold 30px Arial";
      ctx.textAlign = "center";
      ctx.fillText("BEFORE", img1.width / 2, 35);
      ctx.fillText("AFTER", img1.width + img2.width / 2, 35);

      // images
      ctx.drawImage(img1, 0, headingHeight);
      ctx.drawImage(img2, img1.width, headingHeight);

      // download
      const link = document.createElement("a");
      link.download = "before_after.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  }
</script>

</body>
</html>
